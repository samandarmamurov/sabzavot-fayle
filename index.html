<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shop</title>

  <link rel="stylesheet" href="./css/style.css"/>

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="container">
    <div class="top-left">
      <i class="fa-solid fa-location-dot"></i>
      <span>Store Location...</span>
    </div>

    <div class="top-right">
      <span>Eng</span>
      <span>USD</span>
      <span>Sign In</span>
    </div>
  </div>
</div>

<!-- HEADER -->
<header class="header-main">
  <div class="container">

    <div class="logo">
      <img src="./img/Logo (1).png" alt="">
    </div>

    <div class="search-box">
      <input type="text" placeholder="Search">
      <button>Search</button>
    </div>

    <div class="actions">
      <i class="fa-regular fa-heart"></i>

      <div class="cart">
        <i class="fa-solid fa-bag-shopping"></i>
        <div class="badge">2</div>
      </div>
    </div>

  </div>
</header>

<!-- NAV -->
<nav class="navbar">
  <div class="container">
    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">Shop</a>
      <a href="#">Pages</a>
      <a href="#">Blog</a>
    </div>

    <div class="phone">(219) 555-0114</div>
  </div>
</nav>

<!-- BIG IMAGE -->
<div class="big-img">
  <img src="./img/big-img.png">
</div>

<!-- PRODUCTS -->
<div class="product-grid">

  <img src="./img/1-rasm.svg" class="product-img">
  <img src="./img/2-rasm.svg" class="product-img">
  <img src="./img/3-rasm.svg" class="product-img">
  <img src="./img/4-dars.svg" class="product-img">
  <img src="./img/5-rasm.svg" class="product-img">
  <img src="./img/6-rasm.svg" class="product-img">
  <img src="./img/7-rasm.svg" class="product-img">
  <img src="./img/8-rasm.svg" class="product-img">
  <img src="./img/9-rasm.svg" class="product-img">
  <img src="./img/10-rasm.svg" class="product-img">
  <img src="./img/11-rasm.svg" class="product-img">
  <img src="./img/12-rasm.svg" class="product-img">
  <img src="./img/13-rasm.svg" class="product-img">
  <img src="./img/14-rasm.svg" class="product-img">
  <img src="./img/15-rasm.svg" class="product-img">
  <img src="./img/16-rasm.svg" class="product-img">

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <span id="close">&times;</span>
  <img id="modalImg" class="modal-img">
</div>

<script src="./script.js"></script>
</body>
</html>
